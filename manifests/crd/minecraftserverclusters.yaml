                - Pending
                - Provisioning
                - Running
                - Degraded
                - Failed
                - Terminating
                type: string
              message:
                nullable: true
                type: string
              readyServers:
                format: int32
                type: integer
              totalServers:
                format: int32
                type: integer
              readyProxyReplicas:
                format: int32
                type: integer
              proxyEndpoint:
                nullable: true
                properties:
                  host:
                    nullable: true
                    type: string
                  port:
                    format: int32
                    type: integer
                  connectionString:
                    nullable: true
                    type: string
                type: object
              servers:
                items:
                  properties:
                    name:
                      nullable: true
                      type: string
                    phase:
                      enum:
                      - Pending
                      - Provisioning
                      - Running
                      - Paused
                      - Failed
                      - Terminating
                      type: string
                  type: object
                type: array
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      nullable: true
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  type: object
                type: array
            type: object
          spec:
            properties:
              template:
                properties:
                  server:
                    properties:
                      type:
                        enum:
                        - Vanilla
                        - Paper
                        - Spigot
                        - Bukkit
                        type: string
                      version:
                        type: string
                    required:
                    - type
                    type: object
                  properties:
                    properties:
                      motd:
                        nullable: true
                        type: string
                      difficulty:
                        enum:
                        - Peaceful
                        - Easy
                        - Normal
                        - Hard
                        type: string
                      gameMode:
                        enum:
                        - Survival
                        - Creative
                        - Adventure
                        - Spectator
                        type: string
                      maxPlayers:
                        format: int32
                        type: integer
                      onlineMode:
                        type: boolean
                      whitelistEnabled:
                        type: boolean
                      whitelist:
                        items:
                          type: string
                        type: array
                      ops:
                        items:
                          type: string
                        type: array
                      pvp:
                        type: boolean
                      hardcore:
                        type: boolean
                      spawnProtection:
                        format: int32
                        type: integer
                      levelSeed:
                        nullable: true
                        type: string
                      levelType:
                        type: string
                      levelName:
                        type: string
                      viewDistance:
                        format: int32
                        type: integer
                      simulationDistance:
                        format: int32
                        type: integer
                      generateStructures:
                        type: boolean
                      allowNether:
                        type: boolean
                      serverPort:
                        format: int32
                        type: integer
                      additionalProperties:
                        additionalProperties:
                          type: string
                        type: object
                    type: object
                  jvm:
                    properties:
                      initialMemory:
                        type: string
                      maxMemory:
                        type: string
                      extraJvmArgs:
                        items:
                          type: string
                        type: array
                    type: object
                  resources:
                    properties:
                      cpuRequest:
                        nullable: true
                        type: string
                      cpuLimit:
                        nullable: true
                        type: string
                      memoryRequest:
                        nullable: true
                        type: string
                      memoryLimit:
                        nullable: true
                        type: string
                    type: object
                  storage:
                    properties:
                      enabled:
                        type: boolean
                      size:
                        type: string
                      storageClassName:
                        nullable: true
                        type: string
                      deleteWithServer:
                        type: boolean
                      mountPath:
                        type: string
                    type: object
                  acceptEula:
                    type: boolean
                  image:
                    nullable: true
                    type: string
                  imagePullPolicy:
                    enum:
                    - Always
                    - IfNotPresent
                    - Never
                    type: string
                required:
                - server
                - acceptEula
                type: object
              scaling:
                properties:
                  mode:
                    enum:
                    - Static
                    - Dynamic
                    type: string
                  replicas:
                    format: int32
                    type: integer
                  minReplicas:
                    format: int32
                    type: integer
                  maxReplicas:
                    format: int32
                    type: integer
                  policy:
                    nullable: true
                    properties:
                      metric:
                        enum:
                        - PlayerCount
                        type: string
                      targetPercentage:
                        format: int32
                        type: integer
                    type: object
                type: object
              proxy:
                properties:
                  service:
                    properties:
                      type:
                        enum:
                        - ClusterIP
                        - NodePort
                        - LoadBalancer
                        type: string
                      nodePort:
                        format: int32
                        nullable: true
                        type: integer
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                    type: object
                  resources:
                    properties:
                      cpuRequest:
                        nullable: true
                        type: string
                      cpuLimit:
                        nullable: true
                        type: string
                      memoryRequest:
                        nullable: true
                        type: string
                      memoryLimit:
                        nullable: true
                        type: string
                    type: object
                  motd:
                    nullable: true
                    type: string
                  maxPlayers:
                    format: int32
                    type: integer
                  onlineMode:
                    type: boolean
                  playerForwardingMode:
                    enum:
                    - None
                    - Legacy
                    - BungeeGuard
                    - Modern
                    type: string
                  tryOrder:
                    items:
                      format: int32
                      type: integer
                    type: array
                  image:
                    nullable: true
                    type: string
                  imagePullPolicy:
                    enum:
                    - Always
                    - IfNotPresent
                    - Never
                    type: string
                  proxyPort:
                    format: int32
                    type: integer
                  version:
                    type: string
                type: object
            required:
            - template
            - scaling
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
