apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: minecraftserverclusters.mc-operator.dhv.sh
spec:
  group: mc-operator.dhv.sh
  names:
    kind: MinecraftServerCluster
    listKind: MinecraftServerClusterList
    plural: minecraftserverclusters
    shortNames:
    - mcsc
    singular: minecraftservercluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Cluster phase
      jsonPath: .status.phase
      name: Phase
      priority: 0
      type: string
    - description: Ready backend servers
      jsonPath: .status.readyServers
      name: Ready
      priority: 0
      type: integer
    - description: Total backend servers
      jsonPath: .status.totalServers
      name: Total
      priority: 0
      type: integer
    - description: Minecraft version
      jsonPath: .spec.template.server.version
      name: Version
      priority: 0
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          status:
            properties:
              observedGeneration:
                format: int64
                type: integer
              phase:
