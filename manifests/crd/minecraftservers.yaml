apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: minecraftservers.minecraft.hengeveld.dev
spec:
  group: minecraft.hengeveld.dev
  names:
    kind: MinecraftServer
    listKind: MinecraftServerList
    plural: minecraftservers
    shortNames:
    - mcs
    singular: minecraftserver
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Server phase
      jsonPath: .status.phase
      name: Phase
      priority: 0
      type: string
    - description: Minecraft version
      jsonPath: .spec.server.version
      name: Version
      priority: 0
      type: string
    - description: Server distribution
      jsonPath: .spec.server.type
      name: Type
      priority: 0
      type: string
    - description: Ready replicas
      jsonPath: .status.readyReplicas
      name: Ready
      priority: 0
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          status:
            properties:
              observedGeneration:
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - Provisioning
                - Running
                - Paused
                - Failed
                - Terminating
                type: string
              message:
                nullable: true
                type: string
              readyReplicas:
                format: int32
                type: integer
              currentImage:
                nullable: true
                type: string
              currentVersion:
                nullable: true
                type: string
              endpoint:
                nullable: true
                properties:
                  host:
                    nullable: true
                    type: string
                  port:
                    format: int32
                    type: integer
                  connectionString:
                    nullable: true
                    type: string
                type: object
              storage:
                nullable: true
                properties:
                  name:
                    nullable: true
                    type: string
                  phase:
                    nullable: true
                    type: string
                  storageClassName:
                    nullable: true
                    type: string
                  capacity:
                    nullable: true
                    type: string
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      nullable: true
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  type: object
                type: array
            type: object
          spec:
            properties:
              server:
                properties:
                  type:
                    enum:
                    - Vanilla
                    - Paper
                    - Spigot
                    - Bukkit
                    type: string
                  version:
                    type: string
                required:
                - type
                type: object
              properties:
                properties:
                  motd:
                    nullable: true
                    type: string
                  difficulty:
                    enum:
                    - Peaceful
                    - Easy
                    - Normal
                    - Hard
                    type: string
                  gameMode:
                    enum:
                    - Survival
                    - Creative
                    - Adventure
                    - Spectator
                    type: string
                  maxPlayers:
                    format: int32
                    type: integer
                  onlineMode:
                    type: boolean
                  whitelistEnabled:
                    type: boolean
                  whitelist:
                    items:
                      type: string
                    type: array
                  ops:
                    items:
                      type: string
                    type: array
                  pvp:
                    type: boolean
                  hardcore:
                    type: boolean
                  spawnProtection:
                    format: int32
                    type: integer
                  levelSeed:
                    nullable: true
                    type: string
                  levelType:
                    type: string
                  levelName:
                    type: string
                  viewDistance:
                    format: int32
                    type: integer
                  simulationDistance:
                    format: int32
                    type: integer
                  generateStructures:
                    type: boolean
                  allowNether:
                    type: boolean
                  serverPort:
                    format: int32
                    type: integer
                  additionalProperties:
                    additionalProperties:
                      type: string
                    type: object
                type: object
              jvm:
                properties:
                  initialMemory:
                    type: string
                  maxMemory:
                    type: string
                  extraJvmArgs:
                    items:
                      type: string
                    type: array
                type: object
              resources:
                properties:
                  cpuRequest:
                    nullable: true
                    type: string
                  cpuLimit:
                    nullable: true
                    type: string
                  memoryRequest:
                    nullable: true
                    type: string
                  memoryLimit:
                    nullable: true
                    type: string
                type: object
              storage:
                properties:
                  enabled:
                    type: boolean
                  size:
                    type: string
                  storageClassName:
                    nullable: true
                    type: string
                  deleteWithServer:
                    type: boolean
                  mountPath:
                    type: string
                type: object
              service:
                properties:
                  type:
                    enum:
                    - ClusterIP
                    - NodePort
                    - LoadBalancer
                    type: string
                  nodePort:
                    format: int32
                    nullable: true
                    type: integer
                  annotations:
                    additionalProperties:
                      type: string
                    type: object
                type: object
              acceptEula:
                type: boolean
              image:
                nullable: true
                type: string
              imagePullPolicy:
                enum:
                - Always
                - IfNotPresent
                - Never
                type: string
              replicas:
                format: int32
                type: integer
            required:
            - server
            - acceptEula
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}