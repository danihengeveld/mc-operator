apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: mc-operator-validators
webhooks:
- name: validate.minecraftserver.mc-operator.dhv.sh.v1alpha1
  admissionReviewVersions:
  - v1
  clientConfig:
    # When using Helm, caBundle is auto-generated and injected automatically.
    # When using Kustomize, replace with your base64-encoded CA certificate.
    caBundle: ""
    service:
      name: mc-operator
      namespace: mc-operator-system
      path: /validate/minecraftserver
      port: 443
  matchPolicy: Exact
  rules:
  - apiGroups:
    - mc-operator.dhv.sh
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - minecraftservers
  sideEffects: None
  failurePolicy: Fail
  timeoutSeconds: 10
