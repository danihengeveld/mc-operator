# Example: Paper Minecraft Server
# A performance-optimized Paper server with plugins support,
# using NodePort for external access and a whitelist.
apiVersion: minecraft.dhv.sh/v1alpha1
kind: MinecraftServer
metadata:
  name: paper-survival
  namespace: minecraft
spec:
  acceptEula: true

  server:
    type: Paper
    version: "1.20.4"

  properties:
    motd: "§bPaper Survival §r- §eFast & Fun"
    difficulty: Hard
    gameMode: Survival
    maxPlayers: 50
    onlineMode: true
    whitelistEnabled: true
    whitelist:
      - "TrustedPlayer1"
      - "TrustedPlayer2"
      - "TrustedPlayer3"
    pvp: true
    hardcore: false
    spawnProtection: 0
    viewDistance: 12
    simulationDistance: 8
    levelName: survival
    generateStructures: true
    allowNether: true
    ops:
      - "ServerAdmin"
    # Override additional properties not exposed at the spec level
    additionalProperties:
      enable-command-block: "true"
      spawn-monsters: "true"
      max-world-size: "10000"

  jvm:
    initialMemory: "2G"
    maxMemory: "6G"
    extraJvmArgs:
      - "-XX:+UseG1GC"
      - "-XX:G1HeapRegionSize=4M"
      - "-XX:+UnlockExperimentalVMOptions"
      - "-XX:+DisableExplicitGC"
      - "-XX:+AlwaysPreTouch"
      - "-XX:MaxGCPauseMillis=200"

  resources:
    cpuRequest: "2"
    cpuLimit: "4"
    memoryRequest: "6Gi"
    memoryLimit: "8Gi"

  storage:
    enabled: true
    size: "50Gi"
    storageClassName: "fast-ssd"
    deleteWithServer: false
    mountPath: /data

  service:
    type: NodePort
    nodePort: 30565
