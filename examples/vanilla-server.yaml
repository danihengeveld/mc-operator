# Example: Vanilla Minecraft Server
# A simple vanilla server with persistent storage, exposed via LoadBalancer.
apiVersion: minecraft.hengeveld.dev/v1alpha1
kind: MinecraftServer
metadata:
  name: vanilla-server
  namespace: minecraft
spec:
  acceptEula: true

  server:
    type: Vanilla
    version: "1.20.4"

  properties:
    motd: "§aVanilla Survival Server"
    difficulty: Normal
    gameMode: Survival
    maxPlayers: 20
    onlineMode: true
    pvp: true
    hardcore: false
    spawnProtection: 16
    viewDistance: 10
    simulationDistance: 10
    levelName: world
    levelSeed: "12345"
    ops:
      - "AdminPlayer"

  jvm:
    initialMemory: "1G"
    maxMemory: "3G"
    extraJvmArgs:
      - "-XX:+UseG1GC"
      - "-XX:G1HeapRegionSize=4M"
      - "-XX:+UnlockExperimentalVMOptions"
      - "-XX:+DisableExplicitGC"

  resources:
    cpuRequest: "1"
    cpuLimit: "2"
    memoryRequest: "3Gi"
    memoryLimit: "4Gi"

  storage:
    enabled: true
    size: "20Gi"
    deleteWithServer: false
    mountPath: /data

  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
