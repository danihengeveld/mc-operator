name: Release – Container Image

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for writing image attestations (SLSA provenance)
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      # Generate OCI-compliant image metadata (tags, labels) from the git ref and
      # repository metadata. This produces:
      #   - ghcr.io/danihengeveld/mc-operator:1.2.3        (semver)
      #   - ghcr.io/danihengeveld/mc-operator:1.2          (minor)
      #   - ghcr.io/danihengeveld/mc-operator:1            (major)
      #   - ghcr.io/danihengeveld/mc-operator:latest       (on stable tags)
      #   - ghcr.io/danihengeveld/mc-operator:sha-<short>  (traceability)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=mc-operator
            org.opencontainers.image.description=Kubernetes Operator for Minecraft server deployments
            org.opencontainers.image.vendor=hengeveld.dev
            org.opencontainers.image.documentation=https://hengeveld.dev/mc-operator
            org.opencontainers.image.source=https://github.com/danihengeveld/mc-operator
            org.opencontainers.image.licenses=MIT

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching via GitHub Actions cache (speeds up incremental rebuilds)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # Attest the image build — generates SLSA provenance attached to the image
      - name: Generate image attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
