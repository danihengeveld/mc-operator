name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      operator: ${{ steps.filter.outputs.operator }}
      chart: ${{ steps.filter.outputs.chart }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            operator:
              - 'src/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - 'NuGet.config'
              - 'Dockerfile'
            chart:
              - 'charts/**'
            docs:
              - 'docs/**'

  build-and-test:
    name: Build & Test
    needs: changes
    if: needs.changes.outputs.operator == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore McOperator.slnx --locked-mode

      - name: Build
        run: dotnet build McOperator.slnx --no-restore -c Release

      - name: Run tests
        run: dotnet run --project src/McOperator.Tests/McOperator.Tests.csproj -c Release

      - name: Run integration tests
        run: dotnet run --project src/McOperator.IntegrationTests/McOperator.IntegrationTests.csproj -c Release

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

  lint-and-test-chart:
    name: Lint & Test Helm Chart
    needs: changes
    if: needs.changes.outputs.chart == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint charts/mc-operator --strict

      - name: Install helm-unittest plugin
        run: helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest

      - name: Run chart unit tests
        run: helm unittest charts/mc-operator

  build-docs:
    name: Build Docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: docs
        run: bun install

      - name: Build docs
        working-directory: docs
        run: bun run build
