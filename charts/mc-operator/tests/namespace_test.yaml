suite: Namespace
templates:
  - namespace.yaml
release:
  name: mc-operator
  namespace: mc-operator-system
tests:
  - it: creates the namespace by default
    asserts:
      - isKind:
          of: Namespace
      - equal:
          path: metadata.name
          value: mc-operator-system

  - it: does not render when namespace.create is false
    set:
      namespace:
        create: false
        name: mc-operator-system
    asserts:
      - hasDocuments:
          count: 0

  - it: uses custom namespace name
    set:
      namespace:
        create: true
        name: custom-namespace
    asserts:
      - equal:
          path: metadata.name
          value: custom-namespace

  - it: includes common labels
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]
      - exists:
          path: metadata.labels["app.kubernetes.io/managed-by"]
