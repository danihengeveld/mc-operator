# Default values for mc-operator Helm chart.
# Override these in your values file or with --set flags.

# Operator image configuration
image:
  repository: ghcr.io/danihengeveld/mc-operator
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to chart appVersion

imagePullSecrets: []

# Operator deployment configuration
replicaCount: 1

nameOverride: ""
fullnameOverride: ""

# Resource limits for the operator itself
resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

# Node selector and affinity for the operator pod
nodeSelector: {}
tolerations: []
affinity: {}

# Service account for the operator
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Namespace where the operator will be deployed
# The operator watches resources across all namespaces by default
namespace:
  create: true
  name: mc-operator-system

# Logging level (Information, Debug, Warning, Error)
logLevel: Information

# Dashboard configuration (optional monitoring dashboard for Minecraft servers)
dashboard:
  enabled: false
  image:
    repository: ghcr.io/danihengeveld/mc-operator-dashboard
    pullPolicy: IfNotPresent
    tag: ""  # Defaults to chart appVersion
  replicaCount: 1
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  service:
    type: ClusterIP
    port: 80
  nodeSelector: {}
  tolerations: []
  affinity: {}
