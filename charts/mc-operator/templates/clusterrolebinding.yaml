apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mc-operator.fullname" . }}-role-binding
  labels:
    {{- include "mc-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mc-operator.fullname" . }}-role
subjects:
- kind: ServiceAccount
  name: {{ include "mc-operator.serviceAccountName" . }}
  namespace: {{ .Values.namespace.name }}
