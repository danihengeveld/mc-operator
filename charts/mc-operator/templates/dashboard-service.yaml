{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mc-operator.dashboard.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "mc-operator.dashboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
  - port: {{ .Values.dashboard.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "mc-operator.dashboard.selectorLabels" . | nindent 4 }}
{{- end }}
