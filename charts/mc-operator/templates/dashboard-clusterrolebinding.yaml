{{- if .Values.dashboard.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mc-operator.dashboard.fullname" . }}-binding
  labels:
    {{- include "mc-operator.dashboard.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mc-operator.dashboard.fullname" . }}-role
subjects:
- kind: ServiceAccount
  name: {{ include "mc-operator.dashboard.fullname" . }}
  namespace: {{ .Values.namespace.name }}
{{- end }}
