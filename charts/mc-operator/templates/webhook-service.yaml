apiVersion: v1
kind: Service
metadata:
  name: {{ include "mc-operator.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "mc-operator.labels" . | nindent 4 }}
spec:
  ports:
  - name: https
    port: 443
    targetPort: https
  selector:
    {{- include "mc-operator.selectorLabels" . | nindent 4 }}
