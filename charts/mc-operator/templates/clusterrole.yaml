apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mc-operator.fullname" . }}-role
  labels:
    {{- include "mc-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs:
  - '*'
- apiGroups:
  - ""
  resources:
  - services
  - configmaps
  - persistentvolumeclaims
  verbs:
  - '*'
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - get
  - list
  - create
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
# Pre-pull Jobs: created during version upgrades to pull new images and
# pre-download the Minecraft server jar before the rolling update begins.
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - get
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - '*'
- apiGroups:
  - mc-operator.dhv.sh
  resources:
  - minecraftservers
  verbs:
  - '*'
- apiGroups:
  - mc-operator.dhv.sh
  resources:
  - minecraftservers/status
  verbs:
  - get
  - update
  - patch
# MinecraftServerCluster CRD permissions
- apiGroups:
  - mc-operator.dhv.sh
  resources:
  - minecraftserverclusters
  verbs:
  - '*'
- apiGroups:
  - mc-operator.dhv.sh
  resources:
  - minecraftserverclusters/status
  verbs:
  - get
  - update
  - patch
# Deployments (for Velocity proxy)
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - '*'
